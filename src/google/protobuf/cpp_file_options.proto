edition = "2024";

package pb.file;

import "google/protobuf/descriptor.proto";

extend google.protobuf.FileOptions {
  CppFileOptions cpp = 990
      [feature_support = { edition_introduced: EDITION_UNSTABLE }];
}

local message CppFileOptions {
  // Specifying C++ namespace for generated code.
  string namespace = 1;
}
